<html>
  <head>
    <style>
        body {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .offline-page {
          gap: 50px;
          display: flex;
          padding: 40px;
          align-items: center;
          flex-direction: column;
        }

        .offline-page .offline-page__icon-disconnect {
          width: 250px;
        }

        .offline-page p {
          margin-top: -80px;
          font-size: 18px;
          text-align: center;
        }

        .offline-page svg {
          height: auto;
          max-width: 100% ;
        }

        .offline-page .offline-page__retry-button {
          color: #fff;
          height: auto;
          display: block;
          font-size: 14px;
          transition: 0.3s;
          margin-top: -40px;
          padding: 5px 20px;
          text-align: center;
          width: fit-content;
          border-radius: 5px;
          background-color: #3499db;
          border: 1px solid #3499db;
        }

        .offline-page .offline-page__retry-button:hover {
          color: #fff;
          cursor: pointer;
          background-color: #0e79bf;
          box-shadow: 0 2px 4px 0 rgba(14,30,37,.12), 0 2px 16px 0 rgba(14,30,37,.32);
        }

        .offline-page .offline-page__retry-button:focus {
          outline: 0;
        }
    </style>
    <script>
      window.addEventListener('online', () => window.location.reload());
      const text = localStorage.getItem('offlineText')
      const retryButtonText = localStorage.getItem('retryButtonText')
      let isRetrying = false

      window.onload = function() {
        document.getElementById('notify').innerText = text || 'You are currently offline !!'

        const retryButton = document.getElementById('retry-button')
        retryButton.innerText = retryButtonText || 'Retry'

        retryButton.addEventListener('click', async () => {
          if (isRetrying) {
            return
          }
          isRetrying = true
          retryButton.innerText = 'Connecting...'
          retryButton.disabled = true

          try {
            // Test actual network connectivity with a real request
            const testUrl = '/?health-check=' + Date.now()
            const response = await fetch(testUrl, {
              method: 'HEAD',
              cache: 'no-store',
              mode: 'no-cors'
            })

            // Network is available, clear service worker cache and reload
            if ('caches' in window) {
              const cacheNames = await caches.keys()
              await Promise.all(
                cacheNames.map((cacheName) => caches.delete(cacheName))
              )
            }

            // Unregister all service workers to get fresh start
            if ('serviceWorker' in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations()
              await Promise.all(
                registrations.map((registration) => registration.unregister())
              )
            }

            // Navigate to root to get fresh page
            window.location.href = '/'
          } catch (error) {
            // Network request failed, user is truly offline
            retryButton.innerText = retryButtonText || 'Retry'
            retryButton.disabled = false
            isRetrying = false

            // Show brief error message
            const notifyEl = document.getElementById('notify')
            notifyEl.innerText = text || 'Still offline. Please check your connection.'
            setTimeout(() => {
              notifyEl.innerText = text || 'You are currently offline !!'
            }, 3000)
          }
        })
      }
    </script>
