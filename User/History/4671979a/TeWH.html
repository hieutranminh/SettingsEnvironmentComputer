<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate Extension Icons</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background: #1a1a2e;
        color: #f0f0f5;
      }
      h1 {
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .icons-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin: 20px 0;
      }
      .icon-box {
        background: #12121a;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
      }
      canvas {
        border: 1px solid #3a3a45;
        border-radius: 8px;
      }
      button {
        margin-top: 10px;
        padding: 8px 16px;
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        color: #1a1a2e;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        opacity: 0.9;
      }
      .instructions {
        background: #12121a;
        padding: 20px;
        border-radius: 12px;
        margin-top: 20px;
      }
      code {
        background: #2a2a35;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>🎲 Generate Extension Icons</h1>
    <p>Click the download buttons to save each icon size.</p>

    <div class="icons-container" id="icons"></div>

    <div class="instructions">
      <h3>📝 Instructions</h3>
      <ol>
        <li>Click each "Download" button to save the icons</li>
        <li>Move the downloaded icons to <code>public/icons/</code> folder</li>
        <li>Run <code>pnpm build:extension</code> to rebuild</li>
      </ol>
    </div>

    <script>
      const sizes = [16, 32, 48, 128]
      const container = document.getElementById('icons')

      function drawIcon(canvas, size) {
        const ctx = canvas.getContext('2d')
        const scale = size / 128

        // Clear
        ctx.clearRect(0, 0, size, size)

        // Background gradient
        const gradient = ctx.createLinearGradient(0, 0, size, size)
        gradient.addColorStop(0, '#00d4ff')
        gradient.addColorStop(1, '#7c3aed')

        // Draw circle background
        ctx.beginPath()
        ctx.arc(size / 2, size / 2, size / 2 - 2 * scale, 0, Math.PI * 2)
        ctx.fillStyle = gradient
        ctx.fill()

        // Draw dice face (white rounded rect)
        const rectSize = 64 * scale
        const rectX = (size - rectSize) / 2
        const rectY = (size - rectSize) / 2
        const radius = 12 * scale

        ctx.beginPath()
        ctx.roundRect(rectX, rectY, rectSize, rectSize, radius)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.95)'
        ctx.fill()

        // Draw dice dots
        const dotRadius = 6 * scale
        const dotColor = '#7c3aed'
        const dotPositions = [
          [48, 48], // top-left
          [80, 48], // top-right
          [64, 64], // center
          [48, 80], // bottom-left
          [80, 80], // bottom-right
        ]

        ctx.fillStyle = dotColor
        dotPositions.forEach(([x, y]) => {
          ctx.beginPath()
          ctx.arc(x * scale, y * scale, dotRadius, 0, Math.PI * 2)
          ctx.fill()
        })
      }

      sizes.forEach((size) => {
        const box = document.createElement('div')
        box.className = 'icon-box'

        const canvas = document.createElement('canvas')
        canvas.width = size
        canvas.height = size
        canvas.id = `icon-${size}`

        drawIcon(canvas, size)

        const label = document.createElement('p')
        label.textContent = `${size}x${size}`

        const btn = document.createElement('button')
        btn.textContent = 'Download'
        btn.onclick = () => {
          const link = document.createElement('a')
          link.download = `icon-${size}.png`
          link.href = canvas.toDataURL('image/png')
          link.click()
        }

        box.appendChild(canvas)
        box.appendChild(label)
        box.appendChild(btn)
        container.appendChild(box)
      })
    </script>
  </body>
</html>
