<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Ahasoft Plus</title>
        <meta name="author" content="Ahasoft" />
        <meta name="keywords" content="Ahasoft" />
        <meta name="google" content="notranslate" />
        <meta name="theme-color" content="#dee2e6" />
        <meta name="description" content="Ahasoft" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0, viewport-fit=cover, interactive-widget=resizes-content">

        <link href="apple-touch-icon.png" rel="apple-touch-icon" />
        <link href="/template/manifest/manifest.json" rel="manifest" />
        <link href="/template/images/favicon.ico" rel="shortcut icon" />
        <link href="/template/launcher-screen.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nanum+Gothic:400,700,800&amp;subset=korean" rel="stylesheet" preload />
    </head>

    <body id="html-body">
        <div id="splash-screen">
            <img class="logo-splash" src="/template/manifest/icon192x192-removebg.png" />
            <div class="loading"><div class="loader"></div></div>
            <div class="splash-title">
                <img src="/template/images/title.png" alt="Ahasoft Plus" />
            </div>
        </div>

        <div id="app">
            <!-- Loading fallback - will be replaced by Vue app -->
            <div id="app-loading" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff;">
                <div style="text-align: center;">
                    <img src="/template/manifest/icon192x192-removebg.png" style="width: 80px; height: 80px;" alt="Loading..." />
                    <div style="margin-top: 16px; color: #666;">Loading...</div>
                </div>
            </div>
        </div>
    </body>
</html>
